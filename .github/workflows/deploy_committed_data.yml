name: Deploy Committed Cinema Data

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - styles.css
      - app.js
      - dist/showtimes.json
      - dist/poster_cache.json
      - .github/workflows/deploy_committed_data.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build site from committed data
        run: |
          test -f dist/showtimes.json
          mkdir -p site/dist
          cp index.html styles.css app.js site/
          cp dist/showtimes.json site/dist/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
