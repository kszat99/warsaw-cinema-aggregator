<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warsaw Cinema Aggregator | Repertuar Kin</title>
    <meta name="description"
        content="Wszystkie seanse w jednym miejscu. Sprawdź repertuar kin w Warszawie: Kinoteka, Cinema City, Multikino, Novekino i kina studyjne.">
    <!-- Google Fonts: Outfit -->
    <link rel="stylesheet" href="styles.css?v=3">
</head>

<body>

    <header>
        <div class="logo">Warsaw Cinemas Screenings Aggregator</div>
        <div class="header-meta">
            <span class="last-update" id="last-update">Ładowanie...</span>
        </div>
    </header>

    <main>
        <div class="filters-container">
            <div class="search-bar">
                <input type="text" id="movie-search" placeholder="Szukaj tytułu filmu..." autocomplete="off">
                <div class="search-options">
                    <input type="checkbox" id="search-all-dates">
                    <label for="search-all-dates" style="cursor: pointer;">Szukaj we wszystkich dniach</label>
                </div>
            </div>

            <div class="date-selector-wrapper">
                <button class="date-scroll-btn date-scroll-left" id="date-scroll-left"
                    aria-label="Przewiń w lewo">◀</button>
                <div class="date-selector" id="date-selector">
                    <!-- Chips will be generated by JS -->
                </div>
                <button class="date-scroll-btn date-scroll-right" id="date-scroll-right"
                    aria-label="Przewiń w prawo">▶</button>
            </div>

            <div class="cinema-filter">
                <div id="cinema-dropdown-toggle" class="cinema-dropdown-toggle">
                    <span class="toggle-text">Wszystkie kina</span>
                    <span class="toggle-arrow">▼</span>
                </div>
                <div id="cinema-dropdown-panel" class="cinema-dropdown-panel">
                    <!-- Checkboxes will be generated by JS -->
                </div>
            </div>
        </div>

        <div class="movies-grid" id="movies-grid">
            <div class="empty-state">Przygotowywanie repertuaru...</div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <p>GitHub: <a
                        href="https://github.com/kszat99/warsaw-cinema-aggregator">kszat99/warsaw-cinema-aggregator</a>
                </p>
                <p>Don't see your cinema? Write to <a
                        href="mailto:szatkowskikacper@gmail.com">szatkowskikacper@gmail.com</a></p>
                <p class="refresh-info">Screenings are refreshed automatically every day at 04:00 AM UTC.</p>
            </div>
        </div>
    </footer>

    <script src="app.js?v=3"></script>
</body>

</html>
